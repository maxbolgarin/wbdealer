services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: wbdealer
      POSTGRES_USER: wbdealer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wbdealer}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wbdealer -d wbdealer"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  bot:
    build: .
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
